<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - ArtsyVibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f6;
        }
        
        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        
        .terracotta { color: #c17c5f; }
        .bg-terracotta { background-color: #c17c5f; }
        .text-earth { color: #8b7355; }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(139, 115, 85, 0.1), 0 2px 4px -1px rgba(139, 115, 85, 0.06);
        }
        
        .filter-pill { transition: all 0.2s ease; }
        .filter-pill.active {
            background-color: #c17c5f;
            color: white;
            border-color: #c17c5f;
        }
        .filter-pill:not(.active) {
            background-color: white;
            color: #8b7355;
            border-color: #e5e0d8;
        }
        
        .notification-card { transition: all 0.2s ease; }
        .notification-card.unread { background-color: #f8f4f0; }
        .notification-card.read { background-color: white; }
        
        .unread-dot {
            width: 8px;
            height: 8px;
            background-color: #3b82f6;
            border-radius: 50%;
            flex-shrink: 0;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navigation Bar -->
    <nav class="bg-[#faf9f6] border-b border-[#e5e0d8] py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center gap-4 lg:gap-6 min-h-[2.75rem]">
            <!-- Brand -->
            <div class="flex items-center shrink-0 min-w-0">
                <a href="/" class="flex items-center gap-3 group">
                    <img src="/images/Logo.png" alt="ArtsyVibe Logo" class="h-10 w-auto object-contain shrink-0"
                        style="filter: drop-shadow(0 0 0.5px rgba(193, 124, 95, 1));">
                    <span class="text-xl sm:text-2xl font-semibold whitespace-nowrap truncate max-w-[10rem] sm:max-w-none"
                        style="font-family: 'Playfair Display', serif;">
                        ArtsyVibe
                    </span>
                </a>
            </div>

            <!-- Center links -->
            <div class="hidden md:flex flex-1 min-w-0 items-center justify-center gap-6 lg:gap-8 px-2">
                <a href="/" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium whitespace-nowrap shrink-0">Home</a>
                <a href="/products" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium whitespace-nowrap shrink-0">Products</a>
                <a href="/auctions" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium whitespace-nowrap shrink-0">Auctions</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end gap-3 sm:gap-4 shrink-0 ml-auto">
                <div id="login-button-wrapper" class="flex items-center hidden">
                    <a href="/login" class="inline-flex items-center gap-2 px-6 py-2.5 rounded-full bg-[#c17c5f] text-white text-sm font-semibold transition-all hover:bg-[#a5664d]">
                        Login
                    </a>
                </div>

                <div id="user-section" class="hidden flex items-center space-x-4">
                    <a href="/profile" class="flex flex-col items-center text-[#8b7355] hover:text-[#c17c5f]">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <p id="nav-user-name" class="hidden md:block text-[10px] font-semibold mt-0.5">User</p>
                    </a>
                    <a href="/notifications" class="text-[#c17c5f] relative">
                        <i class="fas fa-bell text-xl"></i>
                        <span id="notification-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center hidden">0</span>
                    </a>
                </div>

                <a href="/cart" class="text-[#8b7355] hover:text-[#c17c5f] relative shrink-0">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-2 bg-[#c17c5f] text-white text-[10px] rounded-full w-4 h-4 flex items-center justify-center hidden">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="flex-1 max-w-4xl mx-auto w-full px-6 py-8">
        <div class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-[#5c4a3d] mb-2">Notifications</h1>
                <p class="text-[#8b7355]">Updates about your bids, orders, and wishlist items.</p>
            </div>
            <button onclick="markAllAsRead()" class="text-sm font-semibold text-[#c17c5f] hover:underline mb-1">
                Mark all as read
            </button>
        </div>

        <!-- Filters -->
        <div class="flex gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <button class="filter-pill active px-6 py-2 rounded-full border border-gray-200 font-medium whitespace-nowrap" onclick="filterNotifications(this, 'all')">All</button>
            <button class="filter-pill px-6 py-2 rounded-full border border-gray-200 font-medium whitespace-nowrap" onclick="filterNotifications(this, 'ORDER')">Orders</button>
            <button class="filter-pill px-6 py-2 rounded-full border border-gray-200 font-medium whitespace-nowrap" onclick="filterNotifications(this, 'BID')">Bids</button>
            <button class="filter-pill px-6 py-2 rounded-full border border-gray-200 font-medium whitespace-nowrap" onclick="filterNotifications(this, 'AUCTION')">Auctions</button>
            <button class="filter-pill px-6 py-2 rounded-full border border-gray-200 font-medium whitespace-nowrap" onclick="filterNotifications(this, 'WISHLIST')">Wishlist</button>
        </div>

        <!-- List -->
        <div class="space-y-4" id="notifications-list">
            <!-- Dynamic content here -->
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20">
            <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-bell-slash text-4xl text-gray-300"></i>
            </div>
            <h3 class="text-2xl font-bold text-[#5c4a3d] mb-2">Your inbox is empty</h3>
            <p class="text-gray-500">We'll notify you when something important happens.</p>
        </div>
    </div>

    <script src="/authguard.js"></script>
    <script src="/notifications.js"></script>
</body>
</html>
