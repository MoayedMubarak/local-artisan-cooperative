<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Products - Artisan Co-op</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f6;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }

        .terracotta {
            color: #c17c5f;
        }

        .bg-terracotta {
            background-color: #c17c5f;
        }

        .bg-terracotta-dark {
            background-color: #a5664d;
        }

        .hover\:bg-terracotta-dark:hover {
            background-color: #a5664d;
        }

        .border-terracotta {
            border-color: #c17c5f;
        }

        .text-earth {
            color: #8b7355;
        }

        .bg-earth {
            background-color: #8b7355;
        }

        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(139, 115, 85, 0.1), 0 2px 4px -1px rgba(139, 115, 85, 0.06);
        }

        .card-shadow:hover {
            box-shadow: 0 10px 15px -3px rgba(139, 115, 85, 0.15), 0 4px 6px -2px rgba(139, 115, 85, 0.1);
        }

        .product-card {
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
        }

        .auction-badge {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: #e5e0d8;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #c17c5f;
            cursor: pointer;
            transition: background 0.2s;
        }

        input[type=range]::-webkit-slider-thumb:hover {
            background: #a5664d;
        }

        input[type=range]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #c17c5f;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }

        input[type=range]::-moz-range-thumb:hover {
            background: #a5664d;
        }

        /* Custom Checkbox */
        .custom-checkbox:checked {
            background-color: #c17c5f;
            border-color: #c17c5f;
        }

        .custom-radio:checked {
            border-color: #c17c5f;
        }

        .custom-radio:checked::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #c17c5f;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navigation Bar -->
    <nav class="bg-[#faf9f6] border-b border-[#e5e0d8] py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            
            <div class="flex items-center">
                <a href="/" class="flex items-center gap-3 group">
                    <!-- Logo -->
                    <img src="/images/Logo.png" alt="ArtsyVibe Logo"
                        class="h-10 w-auto object-contain"
                        style="filter: drop-shadow(0 0 0.5px rgba(193, 124, 95, 1));">

                    <!-- Brand Name -->
                    <span class="text-2xl font-semibold" 
                        style="font-family: 'Playfair Display', serif;">
                        ArtsyVibe
                    </span>
                </a>
            </div>

            <!-- Center Links -->
            <div class="hidden md:flex items-center space-x-8">
                <a href="/" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium">Home</a>
                <a href="/products" class="text-[#c17c5f] font-semibold">Products</a>
                <a href="/auctions" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium">Auctions</a>
            </div>

            <div class="flex items-center space-x-4">
                <div id="login-button-wrapper" class="flex items-center hidden">
                    <a href="/login" class="inline-flex items-center gap-2 px-6 py-2.5 rounded-full bg-gradient-to-r from-[#c17c5f] to-[#a5664d] text-white text-sm font-semibold shadow-lg shadow-[#c17c5f]/20 transition-all hover:from-[#b06b4f] hover:to                     [#8f5d3f]">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </a>
                </div>

                <div id="user-section" class="hidden flex items-center space-x-4">
                    <a href="/profile" class="flex flex-col items-center text-[#8b7355] hover:text-[#c17c5f] transition-colors">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <p id="nav-user-name" class="hidden md:block text-[10px] font-semibold text-[#5c4a3d] mt-0.5">John Doe</p>
                    </a>
                    <a id="notifications-link" href="/notifications" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors relative">
                        <i class="fas fa-bell text-xl"></i>
                        <span id="notification-badge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">4</span>
                    </a>
                </div>

                <a id="cart-link" href="/cart" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors relative shrink-0">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-badge"
                        class="absolute -top-2 -right-2 bg-[#c17c5f] text-white text-xs rounded-full w-5 h-5 items-center justify-center"
                        style="display: none;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="flex flex-1 max-w-7xl mx-auto w-full px-6 py-8 gap-8">
        <!-- Left Sidebar -->
        <aside class="w-[250px] flex-shrink-0 hidden lg:block">
            <div class="bg-white rounded-xl p-6 card-shadow sticky top-24">
                <!-- Search Input -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-[#5c4a3d] mb-3">Search Products</h3>
                    <div class="relative">
                        <input 
                            type="text" 
                            placeholder="Search..." 
                            class="w-full px-4 py-2 pl-10 rounded-lg border border-[#e5e0d8] focus:border-[#c17c5f] focus:outline-none text-[#5c4a3d] placeholder-[#b8a99a]"
                        />
                        <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-[#b8a99a]"></i>
                    </div>
                </div>

                <!-- Category Filter -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-[#5c4a3d] mb-3">Categories</h3>
                    <div class="space-y-2">
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="radio" name="category" value="all" class="custom-radio sr-only" checked>
                                <div class="w-4 h-4 border-2 border-[#e5e0d8] rounded-full mr-3 group-hover:border-[#c17c5f] transition-colors"></div>
                            </div>
                            <span class="text-[#5c4a3d] group-hover:text-[#c17c5f] transition-colors">All</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="radio" name="category" value="ceramics" class="custom-radio sr-only">
                                <div class="w-4 h-4 border-2 border-[#e5e0d8] rounded-full mr-3 group-hover:border-[#c17c5f] transition-colors"></div>
                            </div>
                            <span class="text-[#5c4a3d] group-hover:text-[#c17c5f] transition-colors">Ceramics</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="radio" name="category" value="jewelry" class="custom-radio sr-only">
                                <div class="w-4 h-4 border-2 border-[#e5e0d8] rounded-full mr-3 group-hover:border-[#c17c5f] transition-colors"></div>
                            </div>
                            <span class="text-[#5c4a3d] group-hover:text-[#c17c5f] transition-colors">Jewelry</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="radio" name="category" value="paintings" class="custom-radio sr-only">
                                <div class="w-4 h-4 border-2 border-[#e5e0d8] rounded-full mr-3 group-hover:border-[#c17c5f] transition-colors"></div>
                            </div>
                            <span class="text-[#5c4a3d] group-hover:text-[#c17c5f] transition-colors">Paintings</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="radio" name="category" value="textiles" class="custom-radio sr-only">
                                <div class="w-4 h-4 border-2 border-[#e5e0d8] rounded-full mr-3 group-hover:border-[#c17c5f] transition-colors"></div>
                            </div>
                            <span class="text-[#5c4a3d] group-hover:text-[#c17c5f] transition-colors">Textiles</span>
                        </label>
                        <label class="flex items-center cursor-pointer group">
                            <div class="relative">
                                <input type="radio" name="category" value="woodwork" class="custom-radio sr-only">
                                <div class="w-4 h-4 border-2 border-[#e5e0d8] rounded-full mr-3 group-hover:border-[#c17c5f] transition-colors"></div>
                            </div>
                            <span class="text-[#5c4a3d] group-hover:text-[#c17c5f] transition-colors">Woodwork</span>
                        </label>
                    </div>
                </div>

                <!-- Price Range Slider -->
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-[#5c4a3d] mb-3">Price Range</h3>
                    <div class="px-2">
                        <input type="range" min="0" max="1000" value="500" class="w-full" id="priceRange">
                        <div class="flex justify-between mt-2 text-sm text-[#8b7355]">
                            <span>0 BD</span>
                            <span class="font-semibold text-[#c17c5f]" id="priceValue">500 BD</span>
                            <span>1000 BD</span>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1">
            <!-- Top Bar -->
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <p class="text-[#8b7355]">
                    <span id="item-count" class="font-semibold text-[#5c4a3d]">12</span> items found
                </p>
                <div class="flex items-center gap-3">
                    <label class="text-[#5c4a3d] font-medium">Sort by:</label>
                    <select class="px-4 py-2 rounded-lg border border-[#e5e0d8] focus:border-[#c17c5f] focus:outline-none text-[#5c4a3d] bg-white cursor-pointer">
                        <option value="featured">Featured</option>
                        <option value="price-low">Price: Low to High</option>
                        <option value="price-high">Price: High to Low</option>
                        <option value="newest">Newest First</option>
                        <option value="name">Name: A-Z</option>
                    </select>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="product-grid">
                <!-- Dynamic Product Card -->
                <div th:each="product : ${products}" 
                     class="product-card bg-white rounded-xl overflow-hidden card-shadow relative" 
                     th:attr="data-category=${#strings.toLowerCase(product.category)}, data-price=${product.price}, data-id=${product.id}">

                    <button class="wishlist-btn absolute top-3 right-3 z-10 w-10 h-10 bg-white/80 backdrop-blur-sm rounded-full flex items-center justify-center text-[#8b7355] hover:text-[#ef4444] transition-all shadow-sm">
                        <i class="far fa-heart text-lg"></i>
                    </button>

                    <div class="relative">
                        <img th:src="${product.imageUrl}" th:alt="${product.title}" class="w-full h-56 object-cover">
                    </div>

                    <div class="p-5">
                        <h3 class="text-lg font-semibold text-[#5c4a3d] mb-1" th:text="${product.title}">Product Title</h3>
                        <p class="text-[#8b7355] text-sm mb-3" th:text="'by ' + ${product.artisanName}">by Artisan Name</p>
                            <div class="flex items-center justify-between">
                                <span class="text-xl font-bold text-[#c17c5f]" th:text="${#numbers.formatDecimal(product.price, 1, 2)} + ' BD'">0.00 BD</span>
                                <a th:href="@{/ProductDetailsStandard(id=${product.id})}" class="bg-[#c17c5f] hover:bg-[#a5664d] text-white px-4 py-2 rounded-lg font-medium transition-colors text-sm">
                                    View Details
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/authguard.js"></script>
    <script src="/products.js"></script>
    
    <script>
        // Price range slider functionality
        const priceRange = document.getElementById('priceRange');
        const priceValue = document.getElementById('priceValue');

        priceRange.addEventListener('input', function() {
            priceValue.textContent = this.value + ' BD';
        });

        // Custom checkbox functionality
        const checkboxes = document.querySelectorAll('.custom-checkbox');
        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', function() {
                const icon = this.parentElement.querySelector('.checkbox-icon');
                if (this.checked) {
                    icon.style.opacity = '1';
                    this.parentElement.querySelector('div').classList.add('bg-[#c17c5f]', 'border-[#c17c5f]');
                } else {
                    icon.style.opacity = '0';
                    this.parentElement.querySelector('div').classList.remove('bg-[#c17c5f]', 'border-[#c17c5f]');
                }
            });
        });
    </script>
</body>
</html>
