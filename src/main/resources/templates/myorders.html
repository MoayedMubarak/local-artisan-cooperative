<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Artisan Co-op</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f6;
        }
        
        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        
        .terracotta {
            color: #c17c5f;
        }
        
        .bg-terracotta {
            background-color: #c17c5f;
        }
        
        .bg-terracotta-dark {
            background-color: #a5664d;
        }
        
        .hover\:bg-terracotta-dark:hover {
            background-color: #a5664d;
        }
        
        .border-terracotta {
            border-color: #c17c5f;
        }
        
        .text-earth {
            color: #8b7355;
        }
        
        .bg-earth {
            background-color: #8b7355;
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(139, 115, 85, 0.1), 0 2px 4px -1px rgba(139, 115, 85, 0.06);
        }
        
        .card-shadow:hover {
            box-shadow: 0 10px 15px -3px rgba(139, 115, 85, 0.15), 0 4px 6px -2px rgba(139, 115, 85, 0.1);
        }
        
        .status-pending {
            background-color: #fef3c7;
            color: #d97706;
        }
        
        .status-shipped {
            background-color: #dbeafe;
            color: #2563eb;
        }
        
        .status-delivered {
            background-color: #dcfce7;
            color: #16a34a;
        }
        
        .filter-pill {
            transition: all 0.2s ease;
        }
        
        .filter-pill.active {
            background-color: #c17c5f;
            color: white;
            border-color: #c17c5f;
        }
        
        .filter-pill:not(.active) {
            background-color: white;
            color: #8b7355;
            border-color: #e5e0d8;
        }
        
        .filter-pill:not(.active):hover {
            border-color: #c17c5f;
            color: #c17c5f;
        }
        
        .order-row {
            transition: all 0.2s ease;
        }
        
        .order-row:hover {
            background-color: #faf9f6;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Navigation Bar -->
    <nav class="bg-[#faf9f6] border-b border-[#e5e0d8] py-4 px-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex items-center gap-4 lg:gap-6 min-h-[2.75rem]">
            <!-- Brand -->
            <div class="flex items-center shrink-0 min-w-0">
                <a href="/" class="flex items-center gap-3 group">
                    <img src="/images/Logo.png" alt="ArtsyVibe Logo" class="h-10 w-auto object-contain shrink-0"
                        style="filter: drop-shadow(0 0 0.5px rgba(193, 124, 95, 1));">
                    <span class="text-xl sm:text-2xl font-semibold whitespace-nowrap truncate max-w-[10rem] sm:max-w-none"
                        style="font-family: 'Playfair Display', serif;">
                        ArtsyVibe
                    </span>
                </a>
            </div>

            <!-- Center links -->
            <div class="hidden md:flex flex-1 min-w-0 items-center justify-center gap-6 lg:gap-8 px-2">
                <a href="/" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium whitespace-nowrap shrink-0">Home</a>
                <a href="/products"
                    class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium whitespace-nowrap shrink-0">Products</a>
                <a href="/auctions"
                    class="text-[#8b7355] hover:text-[#c17c5f] transition-colors font-medium whitespace-nowrap shrink-0">Auctions</a>
            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end gap-3 sm:gap-4 shrink-0 ml-auto">
                <div id="login-button-wrapper" class="flex items-center hidden">
                    <a href="/login"
                        class="inline-flex items-center gap-2 px-6 py-2.5 rounded-full bg-gradient-to-r from-[#c17c5f] to-[#a5664d] text-white text-sm font-semibold shadow-lg shadow-[#c17c5f]/20 transition-all hover:from-[#b06b4f] hover:to-[#8f5d3f]">
                        <i class="fas fa-sign-in-alt"></i>
                        Login
                    </a>
                </div>

                <div id="user-section" class="hidden flex items-center space-x-4">
                    <a href="/profile" id="user-menu-button"
                        class="flex flex-col items-center text-[#8b7355] hover:text-[#c17c5f] transition-colors">
                        <i class="fas fa-user-circle text-2xl"></i>
                        <p id="nav-user-name" class="hidden md:block text-[10px] font-semibold text-[#5c4a3d] mt-0.5">
                            John Doe</p>
                    </a>

                    <a id="notifications-link" href="/notifications"
                        class="text-[#8b7355] hover:text-[#c17c5f] transition-colors relative">
                        <i class="fas fa-bell text-xl"></i>
                        <span id="notification-badge"
                            class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center">4</span>
                    </a>
                </div>

                <a id="cart-link" href="/cart" class="text-[#8b7355] hover:text-[#c17c5f] transition-colors relative shrink-0">
                    <i class="fas fa-shopping-cart text-xl"></i>
                    <span id="cart-badge"
                        class="absolute -top-2 -right-2 bg-[#c17c5f] text-white text-xs rounded-full w-5 h-5 items-center justify-center"
                        style="display: none;">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <div class="flex flex-1 max-w-7xl mx-auto w-full px-6 py-8 gap-8">        
        <!-- Main Content: My Orders -->
        <main class="flex-1">
            <!-- Page Header -->
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-[#5c4a3d] mb-2">My Orders</h1>
                <p class="text-[#8b7355]">Track and manage your purchases.</p>
            </div>

            <!-- Customer Account Navigation -->
            <div class="bg-white rounded-xl p-4 card-shadow mb-6">
                <div class="flex flex-wrap gap-2">
                    <a href="/myorders" class="px-4 py-2 bg-[#c17c5f] text-white rounded-lg font-medium transition-colors">
                        <i class="fas fa-receipt mr-2"></i>My Orders
                    </a>
                    <a href="/mywishlist" class="px-4 py-2 bg-[#faf9f6] text-[#8b7355] hover:text-[#c17c5f] rounded-lg font-medium transition-colors">
                        <i class="fas fa-heart mr-2"></i>My Wishlist
                    </a>
                    <a href="/profile" class="px-4 py-2 bg-[#faf9f6] text-[#8b7355] hover:text-[#c17c5f] rounded-lg font-medium transition-colors">
                        <i class="fas fa-user mr-2"></i>My Profile
                    </a>
                </div>
            </div>

            <!-- Status Filter Pills -->
            <div class="bg-white rounded-xl p-4 card-shadow mb-6">
                <div class="flex flex-wrap gap-3">
                    <button class="filter-pill active px-5 py-2 rounded-full border-2 font-medium" onclick="filterOrders('all', this)">
                        All Orders
                    </button>
                    <button class="filter-pill px-5 py-2 rounded-full border-2 font-medium" onclick="filterOrders('pending', this)">
                        <i class="fas fa-clock mr-2"></i>Pending
                    </button>
                    <button class="filter-pill px-5 py-2 rounded-full border-2 font-medium" onclick="filterOrders('shipped', this)">
                        <i class="fas fa-truck mr-2"></i>Shipped
                    </button>
                    <button class="filter-pill px-5 py-2 rounded-full border-2 font-medium" onclick="filterOrders('delivered', this)">
                        <i class="fas fa-check-circle mr-2"></i>Delivered
                    </button>
                </div>
            </div>

            <!-- Orders Table -->
            <div class="bg-white rounded-xl card-shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-[#faf9f6] border-b border-[#e5e0d8]">
                            <tr>
                                <th class="text-left py-4 px-6 text-sm font-semibold text-[#5c4a3d]">Order ID</th>
                                <th class="text-left py-4 px-6 text-sm font-semibold text-[#5c4a3d]">Date</th>
                                <th class="text-left py-4 px-6 text-sm font-semibold text-[#5c4a3d]">Products</th>
                                <th class="text-left py-4 px-6 text-sm font-semibold text-[#5c4a3d]">Total</th>
                                <th class="text-left py-4 px-6 text-sm font-semibold text-[#5c4a3d]">Status</th>
                                <th class="text-left py-4 px-6 text-sm font-semibold text-[#5c4a3d]">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Orders will be loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/authguard.js"></script>
    <script src="/myorders.js"></script>
    
    <!-- <script>
        if (window.initAuthGuard) {
            initAuthGuard({
                redirectTo: '/login',
                message: 'Login/Register first to view your orders.'
            });
        }
    </script> -->
</body>
</html>
