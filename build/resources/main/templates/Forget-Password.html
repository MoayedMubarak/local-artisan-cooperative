<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Artisan Co-op</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf9f6;
        }
        
        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
        }
        
        .terracotta {
            color: #c17c5f;
        }
        
        .bg-terracotta {
            background-color: #c17c5f;
        }
        
        .bg-terracotta-dark {
            background-color: #a5664d;
        }
        
        .hover\:bg-terracotta-dark:hover {
            background-color: #a5664d;
        }
        
        .card-shadow {
            box-shadow: 0 4px 6px -1px rgba(139, 115, 85, 0.1), 0 2px 4px -1px rgba(139, 115, 85, 0.06);
        }
        
        .form-input {
            transition: all 0.2s ease;
        }
        
        .form-input:focus {
            border-color: #c17c5f;
            outline: none;
            box-shadow: 0 0 0 3px rgba(193, 124, 95, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
    <!-- Main Card -->
    <div class="w-full max-w-md">
        <!-- Logo at Top -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-[#f5ebe0] rounded-full mb-4">
                <img src="../static/Logo.png" 
                        class="h-10 w-auto object-contain" 
                        style="filter: drop-shadow(0 0 0.5px rgba(193, 124, 95, 1));">
            </div>
        </div>

        <!-- Forgot Password Card -->
        <div class="bg-white rounded-2xl card-shadow overflow-hidden p-10">
            <!-- Heading -->
            <h1 class="text-3xl font-bold text-[#5c4a3d] mb-3 text-center" style="font-family: 'Playfair Display', serif;">Reset Your Password</h1>
            
            <!-- Description -->
            <p class="text-[#8b7355] text-center mb-8 text-lg">Enter your email address and we'll send you a recovery link.</p>
            
            <!-- Form -->
            <form onsubmit="handleRecoveryEmail(event)">
                <div class="space-y-6">
                    <div>
                        <label class="block text-[#5c4a3d] font-semibold mb-2 text-lg">Email Address</label>
                        <input 
                            type="email" 
                            placeholder="your@email.com"
                            class="form-input w-full px-5 py-4 rounded-xl border border-[#e5e0d8] text-[#5c4a3d] placeholder-[#b8a99a] text-lg"
                            required
                        />
                    </div>
                    
                    <button type="submit" class="w-full bg-[#c17c5f] hover:bg-[#a5664d] text-white py-4 rounded-xl font-bold text-lg transition-colors shadow-lg">
                        Send Recovery Email
                    </button>
                </div>
            </form>
            
            <!-- Back to Login Link -->
            <div class="mt-8 text-center">
                <a href="login.html" class="inline-flex items-center text-[#c17c5f] hover:text-[#a5664d] font-medium text-lg transition-colors">
                    <i class="fas fa-arrow-left mr-2"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        // Handle recovery email submission
        function handleRecoveryEmail(event) {
            event.preventDefault();
            alert('Recovery email functionality would be implemented here!');
        }
    </script>
</body>
</html>
